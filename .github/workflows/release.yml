name: Release

on:
  workflow_dispatch:
    inputs:
      publish-mod:
        description: 'Publish the mod to Modrinth and CurseForge'
        default: false
        type: boolean

env:
  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
  CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Get version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build Mod
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.TAG }}
          body_path: changelog.md
          files: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar

      - name: Publish Mod
        if: inputs.publish-mod
        run: |
          ./gradlew :fabric:modrinth
          ./gradlew :neoforge:modrinth
          ./gradlew :fabric:curseforge
          ./gradlew :neoforge:curseforge
  docs:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install LDoc
        run: |
          sudo apt-get install -y lua5.4 luarocks
          sudo luarocks install ldoc

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate docs for this version
        run: |
          mkdir -p gh-pages
          ldoc -c config.ld -d gh-pages .
          touch gh-pages/.nojekyll

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: add ${{ steps.version.outputs.VERSION }}" || echo "Nothing to commit"
          git push