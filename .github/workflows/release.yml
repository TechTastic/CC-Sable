name: Release

on:
  workflow_dispatch:
    inputs:
      publish-mod:
        description: 'Publish the mod to Modrinth and CurseForge'
        default: false
        type: boolean

env:
  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
  CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Get version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build Mod
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.TAG }}
          body_path: changelog.md
          files: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar

      - name: Create and Push Tag Explicitly
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag ${{ steps.version.outputs.TAG }}
          git push origin ${{ steps.version.outputs.TAG }}

      - name: Publish Mod
        if: inputs.publish-mod
        run: |
          ./gradlew :fabric:modrinth
          ./gradlew :neoforge:modrinth
          ./gradlew :fabric:curseforge
          ./gradlew :neoforge:curseforge